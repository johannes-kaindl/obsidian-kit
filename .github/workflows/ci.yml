name: ci
on: [push, pull_request]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
# Kein Build-Schritt: das Kit ist eine Source-Library (raw .ts), kein Plugin.
# Dual-Forge: dieser Workflow läuft am GitHub-Mirror; Codeberg spiegelt die Tags (Spec §6).
